# Tests that verify session-context.sh hint injection works correctly
# These test SCRIPT OUTPUT only — no API cost, no ANTHROPIC_API_KEY required
# Run: cd ~/.claude/promptfoo && promptfoo eval --filter-pattern "session-context"

- description: "Go task hint triggers on .go mention"
  vars:
    prompt: "refactor this handler.go file"
  assert:
    - type: javascript
      value: |
        const { execSync } = require('child_process');
        const hook = process.env.HOME + '/.claude/hooks/session-context.sh';
        const result = execSync(`echo '{"prompt":"refactor this handler.go file"}' | ${hook}`).toString();
        return result.includes('gopls') || result.includes('Go task');

